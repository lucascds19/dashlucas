<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Tarefas</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e8eaed;
    --text-dim: #9aa0ab;
    --accent: #6c8cff;
    --baixa: #4caf7d;
    --media: #e0a83e;
    --alta: #e05a5a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  select, button, input, textarea { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; }
  button { cursor: pointer; background: var(--accent); border: none; color: #0f1115; font-weight: 600; }
  button:hover { opacity: 0.9; }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  #board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 20px 24px; }
  .column { background: var(--panel); border-radius: 10px; padding: 12px; min-height: 200px; }
  .column h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin: 4px 6px 12px; display: flex; justify-content: space-between; }
  .card { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: var(--accent); }
  .card .cliente { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
  .card .titulo { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .card .meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-dim); }
  .badge { padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .badge.baixa { background: rgba(76,175,125,0.15); color: var(--baixa); }
  .badge.media { background: rgba(224,168,62,0.15); color: var(--media); }
  .badge.alta { background: rgba(224,90,90,0.15); color: var(--alta); }
  .empty { color: var(--text-dim); font-size: 12px; padding: 10px 6px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 10; }
  .overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 420px; max-width: 90vw; }
  .modal h3 { margin-top: 0; }
  .field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--text-dim); }
  .field select, .field input, .field textarea { width: 100%; }
  .field textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; justify-content: space-between; margin-top: 16px; }
  .modal-actions .right { display: flex; gap: 8px; }
  #loading { text-align: center; padding: 40px; color: var(--text-dim); }
  #configBox { padding: 20px 24px; }
  #configBox input { width: 100%; margin-bottom: 10px; }
  @media (max-width: 900px) { #board { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { #board { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>📋 Gestão de Tarefas</h1>
  <div class="controls">
    <select id="filterCliente"><option value="">Todos os clientes</option></select>
    <button class="secondary" onclick="loadAll()">↻ Atualizar</button>
    <button onclick="openModal()">+ Nova tarefa</button>
  </div>
</header>

<div id="loading">Carregando...</div>
<div id="board" style="display:none;">
  <div class="column" data-status="A Fazer"><h2>A Fazer <span id="count-A Fazer"></span></h2><div class="cards"></div></div>
  <div class="column" data-status="Em Andamento"><h2>Em Andamento <span id="count-Em Andamento"></span></h2><div class="cards"></div></div>
  <div class="column" data-status="Aguardando Cliente"><h2>Aguardando Cliente <span id="count-Aguardando Cliente"></span></h2><div class="cards"></div></div>
  <div class="column" data-status="Concluído"><h2>Concluído <span id="count-Concluído"></span></h2><div class="cards"></div></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Nova tarefa</h3>
    <input type="hidden" id="taskId">
    <div class="field"><label>Cliente</label><select id="fCliente"></select></div>
    <div class="field"><label>Tarefa</label><input type="text" id="fTarefa" placeholder="Ex: Configurar campanha de Search"></div>
    <div class="field"><label>Descrição (opcional)</label><textarea id="fDescricao"></textarea></div>
    <div class="field"><label>Categoria</label>
      <select id="fCategoria">
        <option>Tráfego Pago</option><option>Site</option><option>CRM/Automação</option>
        <option>Relatório</option><option>Social Media</option><option>Reunião/Alinhamento</option><option>Outro</option>
      </select>
    </div>
    <div class="field"><label>Prioridade</label>
      <select id="fPrioridade"><option value="Baixa">Baixa</option><option value="Média" selected>Média</option><option value="Alta">Alta</option></select>
    </div>
    <div class="field"><label>Prazo</label><input type="date" id="fPrazo"></div>
    <div class="modal-actions">
      <button class="secondary" id="btnDelete" style="display:none; background:rgba(224,90,90,0.15); color: var(--alta);" onclick="handleDelete()">Excluir</button>
      <div class="right">
        <button class="secondary" onclick="closeModal()">Cancelar</button>
        <button onclick="handleSave()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== CONFIGURAÇÃO =====
  // Cole aqui a URL do seu Web App do Apps Script (Code_API.gs) e o mesmo token definido lá.
  // Front chama o proxy interno (Cloudflare Pages Function em /api),
  // que repassa a requisição pro Apps Script sem problema de CORS.
  const API_URL = '/api';
  const API_TOKEN = 'u7Ly32tgnkqYZHQHiQr1s2YfCu8jeMS_nxVVpSaic2w';
  // =========================

  let allTasks = [];
  let allClients = [];
  const STATUSES = ['A Fazer', 'Em Andamento', 'Aguardando Cliente', 'Concluído'];

  async function apiGet(action) {
    const url = API_URL + '?action=' + action + '&token=' + encodeURIComponent(API_TOKEN);
    const res = await fetch(url);
    return res.json();
  }

  async function apiPost(action, payload) {
    // Content-Type text/plain evita preflight CORS (Apps Script não responde OPTIONS)
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ token: API_TOKEN, action, payload })
    });
    return res.json();
  }

  async function loadAll() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('board').style.display = 'none';
    document.getElementById('loading').textContent = 'Carregando...';
    try {
      allClients = await apiGet('getClients');
      if (allClients.error) throw new Error(allClients.error);
      renderClientOptions();
      allTasks = await apiGet('getTasks');
      if (allTasks.error) throw new Error(allTasks.error);
      render();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('board').style.display = 'grid';
    } catch (err) {
      document.getElementById('loading').textContent = 'Erro ao carregar: ' + err.message + ' (confira API_URL e API_TOKEN no código)';
    }
  }

  function renderClientOptions() {
    const filter = document.getElementById('filterCliente');
    const fCliente = document.getElementById('fCliente');
    filter.innerHTML = '<option value="">Todos os clientes</option>';
    fCliente.innerHTML = '';
    allClients.forEach(c => {
      filter.innerHTML += '<option value="' + c.Nome + '">' + c.Nome + '</option>';
      fCliente.innerHTML += '<option value="' + c.Nome + '">' + c.Nome + '</option>';
    });
  }

  function render() {
    const filterVal = document.getElementById('filterCliente').value;
    STATUSES.forEach(status => {
      const col = document.querySelector('.column[data-status="' + status + '"] .cards');
      col.innerHTML = '';
      const tasks = allTasks.filter(t => t.Status === status && (!filterVal || t.Cliente === filterVal));
      document.getElementById('count-' + status).textContent = tasks.length ? '(' + tasks.length + ')' : '';
      if (!tasks.length) { col.innerHTML = '<div class="empty">Sem tarefas</div>'; return; }
      tasks.forEach(t => {
        const prClass = (t.Prioridade || 'Média').toLowerCase() === 'alta' ? 'alta' : (t.Prioridade || '').toLowerCase() === 'baixa' ? 'baixa' : 'media';
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML =
          '<div class="cliente">' + escapeHtml(t.Cliente || '') + '</div>' +
          '<div class="titulo">' + escapeHtml(t.Tarefa || '') + '</div>' +
          '<div class="meta"><span>' + (t.Prazo ? '📅 ' + t.Prazo : '') + '</span>' +
          '<span class="badge ' + prClass + '">' + (t.Prioridade || 'Média') + '</span></div>' +
          '<select class="statusMove" style="margin-top:8px; width:100%;"></select>';
        const sel = div.querySelector('.statusMove');
        STATUSES.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s; opt.textContent = 'Mover para: ' + s;
          if (s === status) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.onclick = e => e.stopPropagation();
        sel.onchange = async e => {
          e.stopPropagation();
          await apiPost('updateTaskStatus', { id: t.ID, status: sel.value });
          loadAll();
        };
        div.onclick = () => openModal(t);
        col.appendChild(div);
      });
    });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  document.getElementById('filterCliente').addEventListener('change', render);

  function openModal(task) {
    document.getElementById('overlay').classList.add('open');
    if (task) {
      document.getElementById('modalTitle').textContent = 'Editar tarefa';
      document.getElementById('taskId').value = task.ID;
      document.getElementById('fCliente').value = task.Cliente;
      document.getElementById('fTarefa').value = task.Tarefa;
      document.getElementById('fDescricao').value = task.Descricao || '';
      document.getElementById('fCategoria').value = task.Categoria || 'Outro';
      document.getElementById('fPrioridade').value = task.Prioridade || 'Média';
      document.getElementById('fPrazo').value = task.Prazo || '';
      document.getElementById('btnDelete').style.display = 'inline-block';
    } else {
      document.getElementById('modalTitle').textContent = 'Nova tarefa';
      document.getElementById('taskId').value = '';
      document.getElementById('fTarefa').value = '';
      document.getElementById('fDescricao').value = '';
      document.getElementById('fPrazo').value = '';
      document.getElementById('btnDelete').style.display = 'none';
    }
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }

  async function handleSave() {
    const id = document.getElementById('taskId').value;
    const payload = {
      cliente: document.getElementById('fCliente').value,
      tarefa: document.getElementById('fTarefa').value,
      descricao: document.getElementById('fDescricao').value,
      categoria: document.getElementById('fCategoria').value,
      prioridade: document.getElementById('fPrioridade').value,
      prazo: document.getElementById('fPrazo').value
    };
    if (!payload.tarefa || !payload.cliente) { alert('Preencha ao menos o cliente e o nome da tarefa.'); return; }
    if (id) {
      payload.id = id;
      await apiPost('updateTask', payload);
    } else {
      payload.status = 'A Fazer';
      await apiPost('addTask', payload);
    }
    closeModal();
    loadAll();
  }

  async function handleDelete() {
    const id = document.getElementById('taskId').value;
    if (!confirm('Excluir esta tarefa?')) return;
    await apiPost('deleteTask', { id });
    closeModal();
    loadAll();
  }

  loadAll();
</script>
</body>
</html>
